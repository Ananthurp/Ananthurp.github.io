  # About
  about:
    enable: true
    title: "About Me"
    # image: "/images/me.png"
    content: |-
      I'm an AI Engineer and Machine Learning Researcher who loves bridging the gap between deep theoretical research and real world, scalable infrastructure. I hold a Master's in Computer Control and Automation from Nanyang Technological University and a Bachelor's in Electrical and Electronics Engineering from the College of Engineering, Trivandrum.

      Recently, I wrapped up a research internship at A*STAR, where I dug into the intricacies of Large Language Model (LLM) alignment. My focus was on understanding the learning dynamics of preference models, specifically studying phenomena like the squeezing effect across RLHF, DPO, and GRPO. I'm also incredibly excited that my recent work on the TS² method, which utilizes a combination of Fenchel Young and tail suppression loss for supervised finetuning, was officially accepted as a conference paper for ICLR 2026!

      Beyond my work with LLMs, my background spans Computer Vision, Deep Learning, and Retrieval Augmented Generation (RAG).
      
      I am currently actively looking for full time roles where I can tackle complex AI challenges from both a research and engineering perspective.
    skills:
      enable: true
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "Python & PyTorch"
        - "Deep Learning & Computer Vision"
        - "LLM Alignment (RLHF, DPO, GRPO)"
        - "Retrieval-Augmented Generation (RAG)"

  #Experience
  experience:
    enable: true
    items:
      - company: "A*STAR, CFAR"
        companyUrl: "https://www.a-star.edu.sg/cfar"
        jobs:
          - name: "Research Intern"
            date: "June 2025 - Mar 2026"
            info:
              content: "Researching Large Language Model (LLM) alignment and preference learning."
            content: |
              I worked on making Large Language Models (LLMs) both highly accurate and more diverse in their responses. Usually, improving diversity causes an AI to make more errors, but I helped develop a new training method called TS² that fixes this trade off.

              - Developed the TS² framework, significantly improving the diversity of AI responses without losing accuracy on standard tests.
              - Studied how AI learns human preferences and investigated the "squeezing effect" that happens during this training process.
              - Co-authored a research paper on this novel training method that was accepted at ICLR 2026, a top tier global AI conference.

      - company: "Energy Research Institute @ NTU (ERI@N)"
        companyUrl: "https://www.ntu.edu.sg/erian"
        jobs:
          - name: "Research Intern"
            date: "Mar 2024 - Dec 2024"
            info:
              content: "Developing AI solutions for energy-efficient smart buildings."
            content: |
              I helped build a smart AI system designed to control air conditioning and heating in large buildings. By predicting the most efficient way to run these systems, we successfully reduced overall energy consumption by 25% to 40%.

              - Created predictive AI models to optimize real-world energy use.
              - Set up the behind the scenes computer servers and databases using Linux and MySQL to allow the AI to process real-time sensor data smoothly.
              - Partnered with Ngee Ann Polytechnic to integrate this software directly into actual building management systems.

      - company: "Schneider Electric"
        companyUrl: "https://www.se.com/"
        jobs: 
          - name: "Electromechanical Design Engineer"
            date: "July 2022 - Aug 2023"
            info:
              content: "Research and development for low voltage electrical switchboards."
            content: |
              I worked on the research and development team to improve the safety and reliability of large-scale industrial electrical switchboards.

              - Designed a new safety feature allowing equipment to be operated safely behind closed doors, which increased customer orders by 20%.
              - Integrated smart temperature and humidity sensors into the equipment.
              - Enabled real-time monitoring to prevent equipment failures before they happen, making the systems much more reliable for end users.
  
