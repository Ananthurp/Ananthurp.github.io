    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Find heading elements
        const elements = document.querySelectorAll('h1, h2, h3');
        elements.forEach(el => {
          // If the element contains your exact name, animate it
          if (el.textContent.trim() === 'Ananthu.') {
            el.innerHTML = ''; // Clear the static text
            new TypeIt(el, {
              strings: "Ananthu.",
              speed: 150,
              waitUntilVisible: true,
              cursor: true,
              cursorChar: "<span style='color: #007bff;'>|</span>"
            }).go();
